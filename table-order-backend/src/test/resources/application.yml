spring:
  datasource:
    url: jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1;MODE=PostgreSQL
    username: sa
    password:
    driver-class-name: org.h2.Driver
  jpa:
    hibernate:
      ddl-auto: create-drop
    properties:
      hibernate:
        dialect: org.hibernate.dialect.H2Dialect
  flyway:
    enabled: false
  sql:
    init:
      mode: never

app:
  jwt:
    secret: test-secret-key-must-be-at-least-256-bits-long-for-hs256-algorithm
    expiration: 57600000
  upload:
    path: ./test-uploads
  cors:
    allowed-origins: http://localhost:3000
  rate-limit:
    requests-per-minute: 1000
  login:
    max-attempts: 5
    lock-duration-minutes: 15
  kakao:
    client-id: test-kakao-client-id
    redirect-uri: http://localhost:3000/customer/auth/kakao/callback

logging:
  level:
    com.tableorder: DEBUG

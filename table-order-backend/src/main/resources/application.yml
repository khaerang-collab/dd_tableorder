server:
  port: 8080
  servlet:
    context-path: /

spring:
  profiles:
    active: local
  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.PostgreSQLDialect
    open-in-view: false
  servlet:
    multipart:
      max-file-size: 5MB
      max-request-size: 10MB
  jackson:
    default-property-inclusion: non_null

app:
  jwt:
    secret: ${JWT_SECRET:default-dev-secret-key-must-be-at-least-256-bits-long-for-hs256}
    expiration: 57600000  # 16시간 (ms)
  upload:
    path: ${UPLOAD_PATH:./uploads/images}
  cors:
    allowed-origins: ${CORS_ORIGINS:http://localhost:3000}
  rate-limit:
    requests-per-minute: 60
  login:
    max-attempts: 5
    lock-duration-minutes: 15
  kakao:
    client-id: ${KAKAO_CLIENT_ID:}
    redirect-uri: ${KAKAO_REDIRECT_URI:http://localhost:3000/customer/auth/kakao/callback}

logging:
  level:
    com.tableorder: DEBUG
    org.springframework.web: INFO
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss.SSS} [%X{requestId}] %-5level %logger{36} - %msg%n"
